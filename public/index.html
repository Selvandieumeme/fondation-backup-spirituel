<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <title>Chat Privé</title>
  <script defer src="/socket.io/socket.io.js"></script>
  <script defer src="main.js"></script>
</head>
<body>
  <h2>Antre nan Chat la</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Non itilizatè" required />
    <input type="password" id="password" placeholder="Modpas" required />
    <button type="submit">Konekte</button>
  </form>

  <div id="chat" style="display:none;">
    <h3>Byenveni! Chat an tan reyèl</h3>
    <ul id="users"></ul>
    <input type="text" id="messageInput" placeholder="Voye mesaj..." />
    <button onclick="sendMessage()">Voye</button>
    <div id="messages"></div>
  </div>
</body>
</html>
