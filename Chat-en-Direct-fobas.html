<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Fobas - Akey</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f8fb;
      color: #333;
    }

    header {
      background-color: #1d3557;
      color: white;
      padding: 20px 15px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 1.8em;
    }

    .container {
      max-width: 720px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .container h2 {
      text-align: center;
      margin-top: 0;
      color: #1d3557;
    }

    .container p {
      text-align: center;
      font-size: 1em;
      margin-bottom: 25px;
    }

    .button-group {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .button-group a {
      text-decoration: none;
      padding: 12px 25px;
      background-color: #457b9d;
      color: white;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    .button-group a:hover {
      background-color: #1d3557;
    }

    footer {
      text-align: right;
      padding: 20px;
      font-size: 0.9em;
      background-color: #f1f1f1;
      color: #555;
    }

    @media screen and (max-width: 600px) {
      .container {
        margin: 20px 10px;
        padding: 15px;
      }

      .button-group a {
        padding: 10px 20px;
        width: 100%;
        text-align: center;
      }

      footer {
        text-align: center;
      }
    }

    @media screen and (max-width: 400px) {
      header h1 {
        font-size: 1.5em;
      }

      .container h2 {
        font-size: 1.2em;
      }

      .container p {
        font-size: 0.95em;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Fondation Backup Spirituel</h1>
  </header>

  <div class="container">
    <h2>Byenveni sou Chat Fobas</h2>
    <p>Tanpri chwazi youn nan seksyon sa yo pou kontinye.</p>

    <div class="button-group">
      <a href="Chat-en-Direct-fobas.html">Antre nan Chat Piblik</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Signup</a>
    </div>
  </div>

  <footer>
    &copy; 2025 Fondation Backup Spirituel
  </footer>

</body>
</html>
