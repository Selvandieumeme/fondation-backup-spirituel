<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Chat en Direct Fobas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <h1>Chat en Direct Fobas</h1>
    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="Chat-en-Direct-fobas.html" class="active">Chat en Direct Fobas</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section style="text-align: center; padding: 40px;">
      <h2>Diskite an dirèk ak lòt vizitè yo!</h2>
      <p>Antre mesaj ou a:</p>
      <input type="text" id="mesaj" placeholder="Ekri mesaj ou..." style="padding: 10px; width: 300px;">
      <br><br>
      <button onclick="voye()" style="padding: 10px 20px;">Voye</button>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2025 Fondation Backup Spirituel - Tout dwa rezève</p>
  </footer>

  <script src="https://js.pusher.com/7.2/pusher.min.js"></script>
  <script>
    function voye() {
      const mesaj = document.getElementById("mesaj").value;

      fetch("https://puffy-uttermost-mail.glitch.me/send", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: mesaj })
      })
      .then(res => res.json())
      .then(data => {
        if (data.sent) {
          alert("Mesaj la ale!");
          document.getElementById("mesaj").value = "";
        } else {
          alert("Mesaj la pa rive.");
        }
      })
      .catch(error => {
        console.error("Erè:", error);
        alert("Gen yon erè sou rezo a.");
      });
    }

    const pusher = new Pusher("5c6d93290538e3d2fbda", {
      cluster: "us2"
    });

    const channel = pusher.subscribe("my-channel");
    channel.bind("my-event", function(data) {
      alert("Nouvo mesaj: " + data.message);
    });
  </script>

</body>
</html>



<style>
  #chatBox {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: start;
    margin-top: 60px;
    text-align: center;
  }

  #chatBox h2 {
    margin-bottom: 10px;
  }

  #chatBox input, #chatBox button {
    margin: 5px 0;
  }
</style>
