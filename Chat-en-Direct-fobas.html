<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Chat en Direct Fobas</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ... (CSS deja la) ... */

    /* STYLE POU TYPING NOTIF */
    #typingIndicator {
      font-style: italic;
      color: gray;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <!-- ... (HEADER & CHAT container deja la) ... -->

  <div class="chat-container">
    <!-- ... -->
    <div id="typingIndicator"></div> <!-- 👉 typing notif -->
    <div id="messageList"></div>
    <!-- ... -->
  </div>

  <!-- ... (FOOTER, AUDIO, PUSHER SCRIPT) ... -->
  <script src="https://js.pusher.com/7.2/pusher.min.js"></script>
  <script>
    function netwaye(mesaj) {
      return mesaj.replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // konvèti :smile: :heart: etc an emoji
    function withEmoji(text) {
      return text
        .replace(/:smile:/g, "😄")
        .replace(/:heart:/g, "❤️")
        .replace(/:thumbsup:/g, "👍")
        .replace(/:cry:/g, "😢");
      // ajoute plis swadizan jan ou vle
    }

    window.onload = () => {
      const savedName = localStorage.getItem("fobas_username");
      if (savedName) document.getElementById("username").value = savedName;
    };

    const pusher = new Pusher("5c6d93290538e3d2fbda", { cluster: "us2" });
    const channel = pusher.subscribe("my-channel");

    let typingTimeout;
    document.getElementById("mesaj").addEventListener("input", () => {
      channel.trigger("client-typing", { typing: true });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(
        () => channel.trigger("client-typing", { typing: false }),
        1000
      );
    });

    channel.bind("client-typing", data => {
      const el = document.getElementById("typingIndicator");
      el.textContent = data.typing ? "Yon moun ap ekri..." : "";
    });

    function voye() {
      const non = document.getElementById("username").value.trim();
      let mesaj = document.getElementById("mesaj").value.trim();
      if (!non || !mesaj) { alert("Tanpri mete non ou epi ekri yon mesaj."); return; }

      document.getElementById("btnVoye").disabled = true;
      localStorage.setItem("fobas_username", non);
      const now = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

      mesaj = withEmoji(mesaj);
      const combo = `[${now}] ${non}: ${netwaye(mesaj)}`;

      fetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: combo })
      })
      .then(res => res.json())
      .then(data => {
        if (data.sent) document.getElementById("mesaj").value = "";
        else alert("Mesaj la pa rive.");
        document.getElementById("btnVoye").disabled = false;
      })
      .catch(() => {
        alert("Gen yon erè sou rezo a."); 
        document.getElementById("btnVoye").disabled = false;
      });

      reponnBot(mesaj);
    }

    function efaseTout() {
      document.getElementById("messageList").innerHTML = "";
    }

    channel.bind("my-event", data => {
      const list = document.getElementById("messageList");
      const wasAtBottom = list.scrollTop + list.clientHeight >= list.scrollHeight - 5;
      const div = document.createElement("div");
      div.textContent = withEmoji(data.message);
      list.appendChild(div);
      if (wasAtBottom) list.scrollTop = list.scrollHeight;
      document.getElementById("messageSound").play().catch(()=>{});
    });

    function reponnBot(mesajUser) {
      const r = {
        "bonjour":"Bonjou! Kijan ou ye?",
        "ki jan ou ye":"Mwen byen, mèsi!",
        "mèsi":"Ou byenveni!",
        "ok":"Dakò!"
      };
      const msg = mesajUser.toLowerCase();
      for (let k in r) {
        if (msg.includes(k)) {
          const now = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
          fetch("/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: `[${now}] BOT: ${r[k]}` })
          });
          return;
        }
      }
    }
  </script>
</body>
</html>
