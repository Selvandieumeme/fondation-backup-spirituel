<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Accueil - Fondation Backup Spirituel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a1f44, #0b2a69);
      color: white;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .container {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      max-width: 1000px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 40px;
      margin: 40px auto;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.3);
    }

    .left,
    .right {
      flex: 1;
      min-width: 300px;
      padding: 20px;
    }

    .left h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .btns {
      margin-bottom: 40px;
    }

    .btns button {
      background-color: #1e3c72;
      color: white;
      padding: 10px 25px;
      margin-right: 15px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 16px;
    }

    .btns button:hover {
      background-color: #355c9c;
    }

    .chat-box {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 20px;
      max-height: 250px;
    }

    .chat-box h3 {
      margin-top: 0;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .chat-message {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-message:last-child {
      border-bottom: none;
    }

    .right form {
      display: flex;
      flex-direction: column;
    }

    .right input[type="email"],
    .right input[type="password"] {
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    .right input::placeholder {
      color: #999;
    }

    .right label {
      margin-bottom: 10px;
      font-size: 14px;
    }

    .seminaire-section {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      margin-top: 10px;
    }

    .seminaire-btn {
      background-color: #2e68ff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .seminaire-btn:hover {
      background-color: #1c4ed8;
    }

    footer {
      text-align: right;
      padding: 15px 30px;
      font-size: 14px;
      color: #ddd;
    }

    @media screen and (max-width: 768px) {
      body {
        padding: 10px;
      }

      .container {
        flex-direction: column;
        padding: 20px;
        margin: 20px;
      }

      footer {
        text-align: center;
        padding: 10px;
      }

      .seminaire-section {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Left side -->
    <div class="left">
      <h1>Sign in to <br>your account</h1>
      <div class="btns">
        <button onclick="window.location.href='login.html'">Sign In</button>
        <button onclick="window.location.href='register.html'">Sign Up</button>
      </div>

      <div class="chat-box">
        <h3>Public Chat</h3>
        <div class="chat-message"><span><strong>User1</strong>: Hello!</span><span>14:00</span></div>
        <div class="chat-message"><span><strong>User2</strong>: Hello!</span><span>14:00</span></div>
        <div class="chat-message"><span><strong>User3</strong>: Hello!</span><span>14:00</span></div>
      </div>
    </div>

    <!-- Right side -->
    <div class="right">
      <form>
        <input type="email" placeholder="Email address" required>
        <input type="password" placeholder="Password" required>
        <label><input type="checkbox" checked> Forgot password?</label>

        <div class="seminaire-section">
          <button class="seminaire-btn">Séminaire Cyber-sécurité et Piratag</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    Fondation Backup Spirituel
  </footer>

</body>
</html>
