<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - Chat Fobas</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0d1a46, #091123);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 30px;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: space-between;
      width: 100%;
      max-width: 900px;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    .left, .right {
      flex: 1;
      min-width: 280px;
      padding: 15px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 20px;
    }

    .buttons {
      margin-bottom: 25px;
    }

    .buttons button {
      background: #1e3a8a;
      border: none;
      color: white;
      padding: 10px 22px;
      margin-right: 10px;
      font-size: 1rem;
      border-radius: 10px;
      cursor: pointer;
    }

    .chat-box {
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 15px;
    }

    .chat-box h3 {
      margin-bottom: 12px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .chat-message {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .right form {
      display: flex;
      flex-direction: column;
    }

    .right input {
      padding: 10px;
      margin-bottom: 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .right input::placeholder {
      color: #ccc;
    }

    .checkbox {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      font-size: 0.9rem;
    }

    .checkbox input {
      margin-right: 8px;
    }

    .seminar-btn {
      background: #2563eb;
      padding: 11px 18px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      margin-bottom: 18px;
      font-size: 0.95rem;
    }

    .lock {
      width: 55px;
      margin-left: auto;
      opacity: 0.6;
    }

    .footer-logo {
      margin-top: 30px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .footer-logo img {
      height: 35px;
      margin-right: 10px;
    }

    .footer-logo span {
      font-weight: bold;
      font-size: 1rem;
      color: #fff;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        align-items: center;
        padding: 25px 15px;
      }

      .footer-logo {
        justify-content: center;
        margin-top: 20px;
      }

      h1 {
        font-size: 1.9rem;
        text-align: center;
      }

      .buttons {
        text-align: center;
      }

      .lock {
        display: block;
        margin: 0 auto 10px;
      }
    }

    /* Additional hidden form logic */
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <h1>Sign in to<br>your account</h1>
      <div class="buttons">
        <button onclick="showForm('signin')">Sign In</button>
        <button onclick="showForm('signup')" style="background: rgba(255,255,255,0.1);">Sign Up</button>
      </div>
      <div class="chat-box">
        <h3>Public Chat</h3>
        <div class="chat-message">
          <span><strong>User1</strong>: Hello!</span>
          <span>14:00</span>
        </div>
        <div class="chat-message">
          <span><strong>User2</strong>: Hello!</span>
          <span>14:00</span>
        </div>
        <div class="chat-message">
          <span><strong>User3</strong>: Hello!</span>
          <span>14:00</span>
        </div>
      </div>
    </div>
    <div class="right">
      <!-- Sign In Form -->
      <form id="signin-form">
        <input type="email" placeholder="Email address" required>
        <input type="password" placeholder="Password" required>
        <div class="checkbox">
          <input type="checkbox" checked>
          <label>Forgot password?</label>
        </div>
        <button class="seminar-btn">Se connecter</button>
      </form>

      <!-- Sign Up Form -->
      <form id="signup-form" class="hidden">
        <input type="text" placeholder="Nom complet" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Créer un mot de passe" required>
        <input type="password" placeholder="Confirmer mot de passe" required>
        <button class="seminar-btn">Créer un compte</button>
      </form>

      <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png" alt="lock" class="lock">
      <div class="footer-logo">
        <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="logo soleil">
        <span>Foundation Backup Spirituel</span>
      </div>
    </div>
  </div>

  <script>
    function showForm(formType) {
      const signInForm = document.getElementById('signin-form');
      const signUpForm = document.getElementById('signup-form');

      if (formType === 'signin') {
        signInForm.classList.remove('hidden');
        signUpForm.classList.add('hidden');
      } else {
        signInForm.classList.add('hidden');
        signUpForm.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
