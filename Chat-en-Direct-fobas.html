<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat en Direct - Fobas</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom right, #081a3e, #0f2e5a);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 95%;
      max-width: 1200px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .left, .right {
      background-color: rgba(255, 255, 255, 0.03);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
      flex: 1;
      min-width: 300px;
    }

    .left h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
    }

    .buttons button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      background: #1a3c89;
      color: white;
      cursor: pointer;
    }

    .buttons button:hover {
      background-color: #2d52a5;
    }

    .chat-box {
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 15px;
    }

    .chat-box h3 {
      margin-bottom: 10px;
    }

    .message {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .message i {
      font-size: 20px;
      margin-right: 10px;
    }

    .message span {
      margin-right: 10px;
      font-weight: bold;
    }

    .right input {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }

    .checkbox input {
      margin-right: 10px;
    }

    .seminaire-btn {
      background-color: #1a3c89;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
    }

    .seminaire-btn:hover {
      background-color: #2d52a5;
    }

    .logo-cadenas {
      width: 80px;
      margin-top: 20px;
      opacity: 0.9;
    }

    .footer {
      width: 100%;
      text-align: right;
      margin-top: 40px;
    }

    .footer-logo {
      width: 200px;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        align-items: center;
      }

      .footer {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Section -->
    <div class="left">
      <h1>Sign in to<br>your account</h1>
      <div class="buttons">
        <button>Sign In</button>
        <button style="background: transparent; border: 1px solid white;">Sign Up</button>
      </div>
      <div class="chat-box">
        <h3>Public Chat</h3>
        <div class="message"><i>👤</i><span>User1</span> Hello! <span style="margin-left:auto;">14:00</span></div>
        <div class="message"><i>👤</i><span>User2</span> Hello! <span style="margin-left:auto;">14:00</span></div>
        <div class="message"><i>👤</i><span>User3</span> Hello! <span style="margin-left:auto;">14:00</span></div>
      </div>
    </div>

    <!-- Right Section -->
    <div class="right">
      <input type="text" placeholder="Email address">
      <input type="password" placeholder="Password">
      <div class="checkbox">
        <input type="checkbox" checked>
        <label>Forgot password?</label>
      </div>
      <button class="seminaire-btn">Séminaire Cyber-sécurité et Piratag</button>
      <img src="https://cdn-icons-png.flaticon.com/512/942/942833.png" alt="cadenas" class="logo-cadenas">
    </div>

    <!-- Footer -->
    <div class="footer">
      <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="logo soleil" class="footer-logo"><br>
      <strong style="font-size: 18px;">Foundation<br>Backup Spirituel</strong>
    </div>
  </div>
</body>
</html>
