<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Chat en Direct Fobas</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    header, footer {
      background-color: #2c3e50;
      color: white;
      padding: 15px 20px;
      text-align: center;
    }

    nav ul {
      list-style: none;
      padding: 0;
    }

    nav ul li {
      display: inline;
      margin-right: 15px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
    }

    nav ul li a.active {
      font-weight: bold;
      text-decoration: underline;
    }

    .chat-container {
      max-width: 700px;
      margin: 40px auto;
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .chat-container h2 {
      text-align: center;
      margin-top: 0;
    }

    #messageList {
      border: 1px solid #ccc;
      padding: 15px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
      background: #f2f2f2;
      border-radius: 5px;
    }

    #messageList div {
      margin-bottom: 10px;
      padding: 8px;
      background: #e8f0fe;
      border-left: 4px solid #3498db;
      border-radius: 4px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    input[type="text"] {
      padding: 10px;
      width: calc(100% - 20px);
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #mesaj {
      width: 70%;
      margin-right: 5px;
    }

    #username {
      width: 50%;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background-color: #3498db;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #2980b9;
    }

    .btn-clear {
      background-color: #e74c3c;
      margin-left: 10px;
    }

    .btn-clear:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Fondation Backup Spirituel</h1>
    <nav>
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="Chat-en-Direct-fobas.html" class="active">Chat en Direct Fobas</a></li>
      </ul>
    </nav>
  </header>

  <!-- ZÒN CHAT -->
  <main>
    <div class="chat-container">
      <h2>Chat en Direct Fobas</h2>
      <p>Diskite an dirèk ak lòt vizitè yo!</p>

      <!-- Zòn mesaj yo -->
      <div id="messageList"></div>

      <!-- Non itilizatè -->
      <div class="form-group">
        <input type="text" id="username" placeholder="Non w la (obligatwa)">
      </div>

      <!-- Antre mesaj + bouton -->
      <div class="form-group">
        <input type="text" id="mesaj" placeholder="Ekri mesaj ou...">
        <button onclick="voye()">Voye</button>
        <button class="btn-clear" onclick="efaseTout()">Efase tout</button>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2025 Fondation Backup Spirituel - Tout dwa rezève</p>
  </footer>

  <!-- SCRIPT PUSHER + CHAT -->
  <script src="https://js.pusher.com/7.2/pusher.min.js"></script>
  <script>
    function voye() {
      const non = document.getElementById("username").value.trim();
      const mesaj = document.getElementById("mesaj").value.trim();

      if (non === "" || mesaj === "") {
        alert("Tanpri mete non ou epi ekri yon mesaj.");
        return;
      }

      const konbine = non + ": " + mesaj;

      fetch("https://puffy-uttermost-mail.glitch.me/send", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: konbine })
      })
      .then(res => res.json())
      .then(data => {
        if (data.sent) {
          document.getElementById("mesaj").value = "";
        } else {
          alert("Mesaj la pa rive.");
        }
      })
      .catch(error => {
        console.error("Erè:", error);
        alert("Gen yon erè sou rezo a.");
      });
    }

    // Fonksyon efase tout mesaj lokalman
    function efaseTout() {
      const zòn = document.getElementById("messageList");
      zòn.innerHTML = "";
    }

    // Resevwa mesaj yo via Pusher
    const pusher = new Pusher("5c6d93290538e3d2fbda", {
      cluster: "us2"
    });

    const channel = pusher.subscribe("my-channel");
    channel.bind("my-event", function(data) {
      const messageList = document.getElementById("messageList");
      const newMessage = document.createElement("div");
      newMessage.textContent = data.message;
      messageList.appendChild(newMessage);
      messageList.scrollTop = messageList.scrollHeight;
    });
  </script>

<script>
// Subscribe ak fetch istwa
const pusher = new Pusher("5c6d93290538e3d2fbda", { cluster: "us2" });
const channel = pusher.subscribe("my-channel");

channel.bind("pusher:subscription_succeeded", fetchHistory);
channel.bind("my-event", appendMessage);

// Fonksyon yo
function fetchHistory() {
  fetch("/messages") // oubyen URL sèvè Glitch ou
    .then(res => res.json())
    .then(data => {
      data.forEach(appendMessage);
    });
}

function appendMessage(data) {
  const ul = document.getElementById("messages");
  const li = document.createElement("li");
  li.innerHTML = `
    <img src="${data.avatarUrl}" alt="${data.userName}" width="32" height="32" style="border-radius:50%;vertical-align:middle;">
    <strong>${data.userName}</strong> <em>${new Date(data.timestamp).toLocaleTimeString()}</em><br>
    ${data.message}
    <button onclick="deleteMessage(${data.id})">🗑️</button>
  `;
  ul.appendChild(li);
}

// Voye mesaj ak avatar/admin
function sendMessage() {
  const userName = "Visiteur"; // ou ranplase ak login user
  const avatarUrl = "https://i.pravatar.cc/32";
  const message = document.getElementById("mesaj").value;
  fetch("/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message, userName, avatarUrl })
  });
}

// Efase mesaj lokal (pòsib ija kont sèvè)
function deleteMessage(id) {
  document.getElementById("messages")
    .querySelectorAll("li")
    .forEach(li => {
      if (li.innerHTML.includes(`deleteMessage(${id})`)) li.remove();
    });
}
</script>
  
</body>
</html>

  }

  #chatBox h2 {
    margin-bottom: 10px;
  }

  #chatBox input, #chatBox button {
    margin: 5px 0;
  }
</style>
