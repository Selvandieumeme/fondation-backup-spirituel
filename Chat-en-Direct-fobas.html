<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <title>Chat en Direct Fobas</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }

    header, footer {
      background-color: #2c3e50;
      color: white;
      padding: 15px 20px;
      text-align: center;
    }

    nav ul {
      list-style: none;
      padding: 0;
    }

    nav ul li {
      display: inline;
      margin-right: 15px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
    }

    nav ul li a.active {
      font-weight: bold;
      text-decoration: underline;
    }

    .chat-container {
      max-width: 700px;
      margin: 40px auto;
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    .chat-container h2 {
      text-align: center;
      margin-top: 0;
    }

    #messageList {
      border: 1px solid #ccc;
      padding: 15px;
      height: 300px;
      overflow-y: auto;
      margin-bottom: 20px;
      background: #f2f2f2;
      border-radius: 5px;
    }

    #messageList div {
      margin-bottom: 10px;
      padding: 8px;
      background: #e8f0fe;
      border-left: 4px solid #3498db;
      border-radius: 4px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    input[type="text"] {
      padding: 10px;
      width: calc(100% - 20px);
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #mesaj {
      width: 70%;
      margin-right: 5px;
    }

    #username {
      width: 50%;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background-color: #3498db;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #2980b9;
    }

    .btn-clear {
      background-color: #e74c3c;
      margin-left: 10px;
    }

    .btn-clear:hover {
      background-color: #c0392b;
    }

    @media screen and (max-width: 600px) {
      .chat-container, #loginContainer { padding:10px; margin:10px; }
      input[type="text"], button { width:100%; margin-bottom:10px; box-sizing:border-box; }
      #messageList { height:250px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Fondation Backup Spirituel</h1>
    <nav>
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="Chat-en-Direct-fobas.html" class="active">Chat en Direct Fobas</a></li>
      </ul>
    </nav>
  </header>

  <!-- LOGIN -->
  <div id="loginContainer" style="text-align:center; margin:20px;">
    <h3>Antre non ou pou kòmanse chat la</h3>
    <input type="text" id="usernameInput" placeholder="Non itilizatè..." style="padding:10px; width:60%; max-width:300px;">
    <button onclick="login()" style="margin-left:10px;">Kòmanse</button>
  </div>

  <!-- CHAT -->
  <main>
    <div class="chat-container" id="chatContainer" style="display:none;">
      <h2>Chat Fobas</h2>
      <div id="messageList"></div>

      <div class="form-group">
        <input type="text" id="username" placeholder="Non w la (obligatwa)">
      </div>

      <div class="form-group">
        <input type="text" id="mesaj" placeholder="Ekri mesaj ou...">
        <button onclick="voye()">Voye</button>
        <button class="btn-clear" onclick="efaseTout()">Efase tout</button>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <audio id="chatSound" src="https://www.soundjay.com/button/beep-07.wav" preload="auto"></audio>
    <p>&copy; 2025 Fondation Backup Spirituel - Tout dwa rezève</p>
  </footer>

  <!-- SCRIPT -->
  <script src="https://js.pusher.com/7.2/pusher.min.js"></script>
  <script>
    function getTime() {
      return new Date().toLocaleTimeString();
    }

    function playSound() {
      const sound = document.getElementById("chatSound");
      sound.play();
    }

    function login() {
      const u = document.getElementById("usernameInput").value.trim();
      if (u) {
        localStorage.setItem("chatUsername", u);
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("chatContainer").style.display = "block";
        document.getElementById("username").value = u;
      }
    }

    window.onload = () => {
      const u = localStorage.getItem("chatUsername");
      if (u) {
        document.getElementById("loginContainer").style.display = "none";
        document.getElementById("chatContainer").style.display = "block";
        document.getElementById("username").value = u;
      }

      const saved = JSON.parse(localStorage.getItem("chatLog")) || [];
      saved.forEach(msg => {
        const div = document.createElement("div");
        div.innerHTML = `<strong>${msg.user}:</strong> ${msg.text} <span style="font-size:12px;color:gray;">[${msg.time}]</span>`;
        document.getElementById("messageList").appendChild(div);
      });
    };

    function voye() {
      const non = document.getElementById("username").value.trim();
      const mesaj = document.getElementById("mesaj").value.trim();
      const time = getTime();
      if (!non || !mesaj) {
        alert("Tanpri mete non ou epi ekri yon mesaj.");
        return;
      }

      const data = { message: `${non}: ${mesaj} [${time}]` };
      fetch("https://chat-en-direct-fobas.onrender.com/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
      .then(r => r.json()).then(responsive => {
        if (responsive.sent) {
          document.getElementById("mesaj").value = "";
          let log = JSON.parse(localStorage.getItem("chatLog")) || [];
          log.push({ user: non, text: mesaj, time });
          localStorage.setItem("chatLog", JSON.stringify(log));
        } else {
          alert("Mesaj la pa rive.");
        }
      })
      .catch(() => alert("Gen yon erè sou rezo a."));
    }

    function efaseTout() {
      document.getElementById("messageList").innerHTML = "";
      localStorage.removeItem("chatLog");
    }

    const pusher = new Pusher("5c6d93290538e3d2fbda", { cluster: "us2" });
    const channel = pusher.subscribe("my-channel");
    channel.bind("my-event", function(data) {
      const div = document.createElement("div");
      div.textContent = data.message;
      document.getElementById("messageList").appendChild(div);
      document.getElementById("messageList").scrollTop = document.getElementById("messageList").scrollHeight;
      playSound();
    });
  </script>

</body>
</html>
