 <section id="apropos">
  <h2>À propos de la Fondation</h2>
  <p>La Fondation Backup Spirituel est une organisation à but non lucratif qui lutte pour les droits humains, l’éducation et le soutien communautaire, en particulier pour les femmes et les enfants dans le Nord-Ouest d'Haïti.</p>

  <p>La Fondation Backup Spirituel est une organisation à but non lucratif qui est affiliée aux églises Catholiques, dédiée à l'amélioration de la vie des enfants défavorisés en Haïti. Fondée par Entrepreneur du Changement Social M. MEME Selvandieu, Mme. MOISE Ranise, et Mme. Shirley depuis USA, cette Fondation s'efforce de fournir un soutien essentiel aux enfants qui font face à des défis socio-économiques dans le pays.</p>

  <p>Les principales missions de la Fondation Backup Spirituel incluent l'accès à l'éducation, aux fournitures scolaires, à l'assainissement, à la nourriture, ainsi qu'à des programmes de développement personnel. Elle vise à créer un environnement où ces enfants peuvent grandir en toute sécurité, s'épanouir et réaliser leur potentiel.</p>

  <p>La fondation repose sur des partenariats locaux et internationaux, ainsi que sur des parrainages individuels, pour financer ses activités et soutenir ces jeunes dans leur cheminement vers un avenir meilleur. Elle croit fermement en l'importance de l'éducation, de la santé et du bien-être des enfants pour contribuer au développement durable d'Haïti.</p>

  <p>En travaillant en étroite collaboration avec les communautés locales et d'autres organisations caritatives, la Fondation Backup Spirituel s'efforce de faire une différence significative dans la vie des enfants haïtiens, tout en promouvant des valeurs de solidarité et d'espoir.</p>
</section>
